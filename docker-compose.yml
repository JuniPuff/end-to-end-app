services:
  e2e-postgres:
    image: postgres:16.3-bookworm
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "devuser"
      POSTGRES_PASSWORD: "devpass"
      POSTGRES_DB: "devdb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 10s
  e2e-migrations:
    depends_on:
      e2e-postgres:
        condition: service_healthy
    links:
      - e2e-postgres
    build:
      context: ./end-to-end-server-stuffs/server-stuffs
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
  e2e-server:
    depends_on:
      e2e-postgres:
        condition: service_healthy
      e2e-migrations:
        condition: service_completed_successfully
    links:
      - e2e-postgres
    ports:
    - "8000:8000"
    build:
      context: ./end-to-end-server-stuffs/server-stuffs
      dockerfile: Dockerfile
    volumes:
      - ./tmpstuff:/app/tmpstuff:rw